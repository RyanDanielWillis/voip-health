name: Build LocalScanner Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'LocalScanner/**'
      - '.github/workflows/build-localscanner.yml'

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
        working-directory: LocalScanner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          if exist requirements.txt python -m pip install -r requirements.txt

      - name: Run PyInstaller
        run: pyinstaller build_tools\voipscan.spec --noconfirm

      - name: Stage distribution package
        shell: pwsh
        run: |
          $pkg = "package\VoIPHealthCheck"
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null
          Copy-Item "dist\VoIPHealthCheck.exe" -Destination $pkg

          # Read version + build tag straight from the package source so
          # the staged artifact is self-identifying (operator can confirm
          # exactly what they extracted without launching the GUI).
          $initText = Get-Content "voipscan\__init__.py" -Raw
          $version = ([regex]::Match($initText, '__version__\s*=\s*"([^"]+)"')).Groups[1].Value
          if (-not $version) { $version = "unknown" }
          $buildTag = ([regex]::Match($initText, '__build_tag__\s*=\s*"([^"]+)"')).Groups[1].Value
          if (-not $buildTag) { $buildTag = "unknown" }
          Write-Host "Detected version=$version build_tag=$buildTag"

          # Versioned copy of the exe alongside the canonical name. Both
          # are kept so existing shortcuts pointing at VoIPHealthCheck.exe
          # keep working, while the versioned name makes it obvious at a
          # glance which build is in the folder.
          Copy-Item "dist\VoIPHealthCheck.exe" -Destination (Join-Path $pkg "VoIPHealthCheck-$version.exe")

          $buildTimestamp = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $sha = $env:GITHUB_SHA
          if (-not $sha) { $sha = "local" }
          $shortSha = if ($sha.Length -ge 7) { $sha.Substring(0,7) } else { $sha }
          $runId = $env:GITHUB_RUN_ID
          if (-not $runId) { $runId = "local" }
          $runNumber = $env:GITHUB_RUN_NUMBER
          if (-not $runNumber) { $runNumber = "local" }
          $refName = $env:GITHUB_REF_NAME
          if (-not $refName) { $refName = "local" }
          $repo = $env:GITHUB_REPOSITORY
          if (-not $repo) { $repo = "local" }

          # Build BUILD_INFO.txt line-by-line. A PowerShell here-string
          # would force its body to flush-left, which collides with YAML
          # block-scalar indentation parsing.
          $buildInfoLines = @(
            "VoIP Health Check LocalScanner",
            "version:        $version",
            "build_tag:      $buildTag",
            "git_sha:        $sha",
            "git_short_sha:  $shortSha",
            "git_ref:        $refName",
            "repo:           $repo",
            "workflow_run:   $runId",
            "workflow_run_number: $runNumber",
            "build_utc:      $buildTimestamp",
            "exe_canonical:  VoIPHealthCheck.exe",
            "exe_versioned:  VoIPHealthCheck-$version.exe"
          )
          Set-Content -Path (Join-Path $pkg "BUILD_INFO.txt") -Value $buildInfoLines -Encoding UTF8
          # VERSION.txt — tiny single-line file for quick eyeballing /
          # for tooling that just wants the version string.
          Set-Content -Path (Join-Path $pkg "VERSION.txt") -Value "$version" -Encoding UTF8
          Write-Host "Staged BUILD_INFO.txt:"
          Get-Content (Join-Path $pkg "BUILD_INFO.txt")

          if (Test-Path "nmap") {
            Copy-Item "nmap" -Destination $pkg -Recurse
            Write-Host "Bundled nmap/ folder into package."
          } else {
            Write-Host "No nmap/ folder present in repo; exe must be distributed alongside an nmap/ folder for full scanning."
          }
          if (Test-Path "README.md") { Copy-Item "README.md" -Destination $pkg }

      - name: Upload portable exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoIPHealthCheck-windows-exe
          path: LocalScanner/dist/VoIPHealthCheck.exe
          if-no-files-found: error

      - name: Upload distributable package artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoIPHealthCheck-windows-package
          path: LocalScanner/package/VoIPHealthCheck/**
          if-no-files-found: error
