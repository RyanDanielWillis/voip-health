<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Angry Voip Scanner{% endblock %}</title>
    <script>
        // Set the theme attribute before first paint to avoid a flash of
        // the wrong theme. Mirrors the logic in /static/theme.js.
        (function () {
            try {
                var saved = null;
                try { saved = localStorage.getItem('avs-theme'); } catch (e) {}
                var theme = (saved === 'light' || saved === 'dark')
                    ? saved
                    : (window.matchMedia &&
                       window.matchMedia('(prefers-color-scheme: light)').matches
                        ? 'light' : 'dark');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='theme.js') }}" defer></script>
</head>
<body>
    <header class="site-header" role="banner">
        <div class="header-inner">
            <a class="brand" href="{{ url_for('index') }}" aria-label="Angry Voip Scanner home">
                <img src="{{ url_for('static', filename='logo2.png') }}" alt="">
                <span class="brand-name">Angry Voip Scanner</span>
            </a>
            <nav class="nav-links" aria-label="Primary">
                <a href="{{ url_for('index') }}"
                   class="{% if active_page == 'home' %}active{% endif %}">Home</a>
                <a href="{{ url_for('dashboard') }}"
                   class="{% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
            </nav>
            <div class="header-actions">
                <a class="icon-link"
                   href="https://github.com/RyanDanielWillis/angry-voip-scanner"
                   target="_blank" rel="noopener noreferrer"
                   aria-label="GitHub repository">
                    <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                    </svg>
                    <span class="icon-link-label">GitHub</span>
                </a>
                <button class="toggle-btn" type="button"
                        data-theme-toggle
                        aria-label="Toggle color theme"
                        aria-pressed="false">☀️ Light</button>
            </div>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
