<!DOCTYPE html>
<html>
<head><title>Audit Dashboard</title></head>
<body>
    <h1>Audit Records</h1>
    <table border="1">
        <tr><th>ID</th><th>Data</th></tr>
        {% for row in data %}
        <tr>
            <td>{{ row.id }}</td>
            <td>{{ row.data }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
